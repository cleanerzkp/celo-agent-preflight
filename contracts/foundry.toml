[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
bytecode_hash = "ipfs"
fs_permissions = [{ access = "read", path = "./" }]

[profile.ci]
verbosity = 3
fuzz = { runs = 512 }
invariant = { runs = 128, depth = 32 }

[rpc_endpoints]
celo = "${CELO_RPC_URL}"
celo_sepolia = "${CELO_SEPOLIA_RPC_URL}"
forno = "https://forno.celo.org"
forno_sepolia = "https://forno.celo-sepolia.celo-testnet.org"
localhost = "http://127.0.0.1:8545"

[etherscan]
celo = { key = "${ETHERSCAN_API_KEY}", chain = 42220, url = "https://api.etherscan.io/v2/api" }
celo_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11142220, url = "https://api.etherscan.io/v2/api" }

